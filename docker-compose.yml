services:
  redis:
    image: redis:7-alpine
    container_name: redis
    network_mode: host
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
 
  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    container_name: hr-backend
    network_mode: host
    depends_on:
      redis:
        condition: service_healthy
      ai-ml-service:
        condition: service_started
    env_file:
      - ./services/backend/.env
    environment:
      HR_APP_ENVIRONMENT: development
      HR_APP_REDIS_HOST: localhost
      HR_APP_REDIS_PORT: "6379"
      HR_APP_REDIS_DB: "0"
      HR_APP_AI_SERVICE_URL: http://localhost:8001
      HR_APP_VECTOR_DIMENSION: "768"
      HR_APP_CACHE_PREFIX: "hr_backend:"
      PYTHONPATH: /app
    volumes:
      - ./services/backend/src:/app/src
      - upload_data:/app/uploads
    restart: always
 
  worker:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    container_name: hr-worker
    network_mode: host
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./services/backend/.env
    environment:
      HR_APP_REDIS_HOST: localhost
      HR_APP_REDIS_PORT: "6379"
      HR_APP_REDIS_DB: "0"
      HR_APP_AI_SERVICE_URL: http://localhost:8001
      HR_APP_VECTOR_DIMENSION: "768"
      HR_APP_CACHE_PREFIX: "hr_worker:"
      PYTHONPATH: /app
    volumes:
      - ./services/backend/src:/app/src
      - upload_data:/app/uploads
    command: python3 -m arq src.worker.WorkerSettings
    restart: always
 
  ai-ml-service:
    build:
      context: ./services/ai-ml
    container_name: ai-ml-service
    network_mode: host
    env_file:
      - ./services/ai-ml/.env
    environment:
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_DB: 1
      REDIS_PREFIX: "aiml:"
      DATABASE_URL: ${DATABASE_URL}
      PYTHONPATH: /app/src
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./services/ai-ml/src:/app/src
    working_dir: /app/src
    command: python3 -m uvicorn main:app --host 0.0.0.0 --port 8001
    restart: always
 
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: hr-frontend
    network_mode: host
    environment:
      NEXT_PUBLIC_API_URL: "http://167.235.136.54:8000"
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:-}
    depends_on:
      - backend
    restart: always
 
volumes:
  redis_data:
  upload_data: