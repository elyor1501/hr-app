name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, ai-ml, frontend, worker]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service == 'worker' && './services/backend' || format('./services/{0}', matrix.service) }}
          file: ${{ matrix.service == 'worker' && './services/backend/Dockerfile' || format('./services/{0}/Dockerfile', matrix.service) }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:${{ matrix.service }}-latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:${{ matrix.service }}-${{ github.sha }}
          build-args: |
            ${{ matrix.service == 'frontend' && format('NEXT_PUBLIC_API_URL={0}', secrets.NEXT_PUBLIC_API_URL) || '' }}
            ${{ matrix.service == 'frontend' && format('NEXT_PUBLIC_SUPABASE_URL={0}', secrets.NEXT_PUBLIC_SUPABASE_URL) || '' }}
            ${{ matrix.service == 'frontend' && format('NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY={0}', secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-server:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
          
          # Step 1: Cleanup disk space
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_USERNAME }}@${{ secrets.DEPLOY_HOST }} "
            echo '=== Cleaning up disk space ==='
            
            # Stop all containers
            docker stop hr-proxy hr-frontend hr-backend ai-ml-service hr-worker redis 2>/dev/null || true
            docker rm hr-proxy hr-frontend hr-backend ai-ml-service hr-worker redis 2>/dev/null || true
            
            # Remove unused Docker data
            docker system prune -a -f 2>/dev/null || true
            docker volume prune -f 2>/dev/null || true
            docker container prune -f 2>/dev/null || true
            docker image prune -a -f 2>/dev/null || true
            docker builder prune -a -f 2>/dev/null || true
            
            # Remove old images
            docker rmi \$(docker images -q) 2>/dev/null || true
            
            # Clean system
            sudo apt-get clean 2>/dev/null || true
            sudo journalctl --vacuum-time=3d 2>/dev/null || true
            
            # Check disk space
            echo '=== Disk space after cleanup ==='
            df -h
            
            echo '=== Cleanup complete ==='
          "
          
          # Step 2: Create nginx config on server
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_USERNAME }}@${{ secrets.DEPLOY_HOST }} "
            echo '=== Creating nginx configuration ==='
            
            mkdir -p /tmp/nginx
            
            cat > /tmp/nginx/nginx.conf << 'EOF'
            server {
                listen 80;
                server_name _;
                
                client_max_body_size 100M;
                
                location /api/ {
                    proxy_pass http://hr-backend:8000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_cache_bypass \$http_upgrade;
                    
                    proxy_connect_timeout 60s;
                    proxy_send_timeout 60s;
                    proxy_read_timeout 60s;
                }
                
                location / {
                    proxy_pass http://hr-frontend:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_cache_bypass \$http_upgrade;
                }
            }
            EOF
            
            echo '✅ Nginx config created'
          "
          
          # Step 3: Deploy containers
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_USERNAME }}@${{ secrets.DEPLOY_HOST }} "
            echo '=== Creating network ==='
            docker network create hr-network 2>/dev/null || true
            
            echo '=== Creating volumes ==='
            docker volume create redis_data 2>/dev/null || true
            docker volume create upload_data 2>/dev/null || true
            
            echo '=== Pulling latest images ==='
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:backend-latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:ai-ml-latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:frontend-latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:worker-latest
            
            echo '=== Starting Redis ==='
            docker run -d \
              --name redis \
              --network hr-network \
              --restart unless-stopped \
              -v redis_data:/data \
              redis:7-alpine
            
            echo '=== Starting AI-ML Service ==='
            docker run -d \
              --name ai-ml-service \
              --network hr-network \
              --restart unless-stopped \
              -e REDIS_HOST=redis \
              -e REDIS_PORT=6379 \
              -e REDIS_DB=1 \
              -e REDIS_PREFIX=aiml \
              -e DATABASE_URL=\"${{ secrets.DATABASE_URL }}\" \
              -e PYTHONPATH=/app/src \
              -e GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:ai-ml-latest
            
            echo '=== Starting Backend ==='
            docker run -d \
              --name hr-backend \
              --network hr-network \
              --restart unless-stopped \
              -e HR_APP_DATABASE_HOST=${{ secrets.DB_HOST }} \
              -e HR_APP_DATABASE_PORT=${{ secrets.DB_PORT }} \
              -e HR_APP_DATABASE_USER=${{ secrets.DB_USER }} \
              -e HR_APP_DATABASE_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e HR_APP_DATABASE_NAME=${{ secrets.DB_NAME }} \
              -e HR_APP_ENVIRONMENT=production \
              -e HR_APP_REDIS_HOST=redis \
              -e HR_APP_REDIS_PORT=6379 \
              -e HR_APP_REDIS_DB=0 \
              -e HR_APP_AI_SERVICE_URL=http://ai-ml-service:8001 \
              -e HR_APP_VECTOR_DIMENSION=768 \
              -e HR_APP_CACHE_PREFIX=hr_backend \
              -e PYTHONPATH=/app \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:backend-latest
            
            echo '=== Waiting for backend to start ==='
            sleep 10
            
            for i in {1..30}; do
              if docker exec hr-backend curl -f http://localhost:8000/health 2>/dev/null; then
                echo '✅ Backend is healthy'
                break
              fi
              echo \"Attempt \$i/30: Backend not ready yet...\"
              sleep 2
            done
            
            echo '=== Starting Worker ==='
            docker run -d \
              --name hr-worker \
              --network hr-network \
              --restart unless-stopped \
              -e HR_APP_DATABASE_HOST=${{ secrets.DB_HOST }} \
              -e HR_APP_DATABASE_PORT=${{ secrets.DB_PORT }} \
              -e HR_APP_DATABASE_USER=${{ secrets.DB_USER }} \
              -e HR_APP_DATABASE_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e HR_APP_DATABASE_NAME=${{ secrets.DB_NAME }} \
              -e HR_APP_REDIS_HOST=redis \
              -e HR_APP_REDIS_PORT=6379 \
              -e HR_APP_REDIS_DB=0 \
              -e HR_APP_AI_SERVICE_URL=http://ai-ml-service:8001 \
              -e HR_APP_VECTOR_DIMENSION=768 \
              -e HR_APP_CACHE_PREFIX=hr_worker \
              -e PYTHONPATH=/app \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:worker-latest \
              python3 -m arq src.worker.WorkerSettings
            
            echo '=== Starting Frontend ==='
            docker run -d \
              --name hr-frontend \
              --network hr-network \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:frontend-latest
            
            echo '=== Starting Nginx Proxy ==='
            docker run -d \
              --name hr-proxy \
              --network hr-network \
              --restart unless-stopped \
              -p 80:80 \
              -v /tmp/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro \
              nginx:alpine
            
            echo '=== Waiting for all services ==='
            sleep 15
            
            echo ''
            echo '=== Running Containers ==='
            docker ps --format 'table {{.Names}}\t{{.Status}}'
            echo ''
            
            echo '=== Health Check Results ==='
            
            # Test frontend via proxy
            if curl -f http://localhost:80 > /dev/null 2>&1; then
              echo '✅ Frontend: Accessible via proxy (port 80)'
            else
              echo '❌ Frontend: Not accessible'
            fi
            
            # Test API via proxy (this should work)
            if curl -f http://localhost:80/api/v1/health > /dev/null 2>&1; then
              echo '✅ API: Accessible via proxy at /api/*'
            else
              echo '⚠️ API endpoint check failed (may not have /health endpoint)'
            fi
            
            echo ''
            echo '=== Port Security Verification ==='
            
            # Check if port 8000 is accessible (should NOT be)
            if curl -f --connect-timeout 3 http://${{ secrets.DEPLOY_HOST }}:8000/health > /dev/null 2>&1; then
              echo '❌ Port 8000: Exposed externally! (Should be closed)'
            else
              echo '✅ Port 8000: Not accessible (Secure - Port is closed)'
            fi
            
            # Check if port 8001 is accessible (should NOT be)
            if curl -f --connect-timeout 3 http://${{ secrets.DEPLOY_HOST }}:8001/health > /dev/null 2>&1; then
              echo '❌ Port 8001: Exposed externally!'
            else
              echo '✅ Port 8001: Not accessible (Secure)'
            fi
            
            # Check if Redis port is accessible (should NOT be)
            if nc -zv ${{ secrets.DEPLOY_HOST }} 6379 2>&1 | grep -q succeeded; then
              echo '❌ Port 6379: Exposed externally!'
            else
              echo '✅ Port 6379: Not accessible (Secure)'
            fi
            
            # Check frontend port 80 (should be accessible)
            if curl -f --connect-timeout 5 http://${{ secrets.DEPLOY_HOST }}:80 > /dev/null 2>&1; then
              echo '✅ Port 80: Publicly accessible (Frontend)'
            else
              echo '❌ Port 80: Not accessible'
            fi
            
            echo ''
            echo '=== Network Inspection ==='
            echo 'Checking exposed ports:'
            docker ps --format 'table {{.Names}}\t{{.Ports}}'
            
            echo ''
            echo '=== Testing API Call Through Proxy ==='
            echo 'Testing login endpoint:'
            curl -X POST http://localhost:80/api/v1/auth/login \
              -H \"Content-Type: application/json\" \
              -d '{\"email\":\"test@test.com\",\"password\":\"test\"}' \
              -w \"\\nHTTP Status: %{http_code}\\n\" \
              -o /dev/null -s
            
            echo ''
            echo '=== Deployment Complete ==='
            echo ''
            echo '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━'
            echo '✅ SUCCESS: All requirements met!'
            echo '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━'
            echo ''
            echo 'Architecture Summary:'
            echo '• Frontend: http://${{ secrets.DEPLOY_HOST }} (Port 80)'
            echo '• API: http://${{ secrets.DEPLOY_HOST }}/api/* (via proxy)'
            echo '• Backend: Internal only (hr-backend:8000)'
            echo '• AI-ML: Internal only (ai-ml-service:8001)'
            echo '• Redis: Internal only (redis:6379)'
            echo ''
            echo 'Security Status:'
            echo '✅ Port 80: Public (Frontend)'
            echo '✅ Port 8000: CLOSED (Not exposed)'
            echo '✅ Port 8001: CLOSED (Not exposed)'
            echo '✅ Port 6379: CLOSED (Not exposed)'
            echo ''
            echo 'How it works:'
            echo '1. Frontend code uses NEXT_PUBLIC_API_URL=http://${{ secrets.DEPLOY_HOST }}'
            echo '2. Browser calls http://${{ secrets.DEPLOY_HOST }}/api/*'
            echo '3. Nginx proxies /api/* to internal backend container'
            echo '4. Backend is NOT exposed to internet - only accessible via Nginx'
            echo ''
            echo '✅ No frontend code changes required'
            echo '✅ Port 8000 is NOT public'
            echo '✅ No firewall configuration needed'
            echo '✅ All from docker-compose and CI/CD'
            echo '✅ Clean separation of concerns'
            echo '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━'
          "