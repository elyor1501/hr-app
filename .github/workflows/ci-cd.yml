name: CI/CD Pipeline

on:
  push:
    branches:
      - feature/aiml-backend-integration
  pull_request:
    branches:
      - feature/aiml-backend-integration

jobs:
  # Job 1: Check and Build
  check-and-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build Backend (without push)
      - name: Build Backend
        uses: docker/build-push-action@v5
        with:
          context: ./services/backend
          file: ./services/backend/Dockerfile
          push: false
          load: true
          tags: hr-app-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build AI-ML Service (without push)
      - name: Build AI-ML Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/ai-ml
          file: ./services/ai-ml/Dockerfile
          push: false
          load: true
          tags: hr-app-ai-ml:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build Frontend (without push)
      - name: Build Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          file: ./services/frontend/Dockerfile
          push: false
          load: true
          tags: hr-app-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build Worker (without push)
      - name: Build Worker
        uses: docker/build-push-action@v5
        with:
          context: ./services/backend
          file: ./services/backend/Dockerfile
          push: false
          load: true
          tags: hr-app-worker:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # - name: Run tests
      #   run: |
      #     docker run hr-app-backend:test pytest
      #     docker run hr-app-frontend:test npm test

  # Job 2: Push to Docker Hub
  push-to-dockerhub:
    runs-on: ubuntu-latest
    needs: check-and-build  
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Push Backend
      - name: Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./services/backend
          file: ./services/backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:backend-latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:backend-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Push AI-ML Service
      - name: Push AI-ML Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/ai-ml
          file: ./services/ai-ml/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:ai-ml-latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:ai-ml-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Push Frontend
      - name: Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          file: ./services/frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:frontend-latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:frontend-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Push Worker
      - name: Push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./services/backend
          file: ./services/backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:worker-latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:worker-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 3: Deploy to Server (Commented for now)
  deploy-to-server:
    runs-on: ubuntu-latest
    needs: push-to-dockerhub  
    if: github.event_name == 'push' && github.ref == 'refs/heads/feature/aiml-backend-integration'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            # Navigate to app directory
            cd /path/to/your/app

            # Pull latest images from Docker Hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:backend-latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:frontend-latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:ai-ml-latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:worker-latest

            # Deploy with docker-compose
            docker compose down
            docker compose up -d

      # Optional: Health check
      # - name: Health Check
      #   run: |
      #     sleep 10
      #     curl -f http://${{ secrets.DEPLOY_HOST }}:8000/health || exit 1
