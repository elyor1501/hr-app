name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, ai-ml, frontend, worker]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service == 'worker' && './services/backend' || format('./services/{0}', matrix.service) }}
          file: ${{ matrix.service == 'worker' && './services/backend/Dockerfile' || format('./services/{0}/Dockerfile', matrix.service) }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:${{ matrix.service }}-latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:${{ matrix.service }}-${{ github.sha }}
          build-args: |
            ${{ matrix.service == 'frontend' && format('NEXT_PUBLIC_API_URL={0}', secrets.NEXT_PUBLIC_API_URL) || '' }}
            ${{ matrix.service == 'frontend' && format('NEXT_PUBLIC_SUPABASE_URL={0}', secrets.NEXT_PUBLIC_SUPABASE_URL) || '' }}
            ${{ matrix.service == 'frontend' && format('NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY={0}', secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-server:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
          
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_USERNAME }}@${{ secrets.DEPLOY_HOST }} "
            echo '=== Cleaning up old containers ==='
            docker stop redis backend ai-ml-service worker frontend 2>/dev/null || true
            docker rm redis backend ai-ml-service worker frontend 2>/dev/null || true
            docker system prune -a -f 2>/dev/null || true
            echo '=== Cleanup complete ==='
          "
          
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_USERNAME }}@${{ secrets.DEPLOY_HOST }} "
            echo '=== Creating Docker network ==='
            docker network create hr-network 2>/dev/null || true
            
            echo '=== Pulling latest images ==='
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:backend-latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:ai-ml-latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:frontend-latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:worker-latest
            
            echo '=== Starting Redis (Internal Only - No Port) ==='
            docker run -d \
              --name redis \
              --network hr-network \
              --restart unless-stopped \
              redis:7-alpine
            
            echo '=== Starting Backend (Internal Only - No Port Exposed to Host) ==='
            docker run -d \
              --name backend \
              --network hr-network \
              --restart unless-stopped \
              -e HR_APP_DATABASE_HOST=${{ secrets.DB_HOST }} \
              -e HR_APP_DATABASE_PORT=${{ secrets.DB_PORT }} \
              -e HR_APP_DATABASE_USER=${{ secrets.DB_USER }} \
              -e HR_APP_DATABASE_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e HR_APP_DATABASE_NAME=${{ secrets.DB_NAME }} \
              -e HR_APP_ENVIRONMENT=production \
              -e HR_APP_REDIS_HOST=redis \
              -e HR_APP_REDIS_PORT=6379 \
              -e HR_APP_REDIS_DB=0 \
              -e HR_APP_AI_SERVICE_URL=http://ai-ml-service:8001 \
              -e HR_APP_VECTOR_DIMENSION=768 \
              -e HR_APP_CACHE_PREFIX=hr_backend \
              -e PYTHONPATH=/app \
              -e SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
              -e SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:backend-latest
            
            echo '=== Waiting for backend to initialize ==='
            sleep 10
            
            echo '=== Starting AI-ML Service (Internal Only - No Port) ==='
            docker run -d \
              --name ai-ml-service \
              --network hr-network \
              --restart unless-stopped \
              -e REDIS_HOST=redis \
              -e REDIS_PORT=6379 \
              -e REDIS_DB=1 \
              -e REDIS_PREFIX=aiml \
              -e DATABASE_URL=\"${{ secrets.DATABASE_URL }}\" \
              -e PYTHONPATH=/app/src \
              -e GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:ai-ml-latest
            
            echo '=== Starting Worker (Internal Only - No Port) ==='
            docker run -d \
              --name worker \
              --network hr-network \
              --restart unless-stopped \
              -e HR_APP_DATABASE_HOST=${{ secrets.DB_HOST }} \
              -e HR_APP_DATABASE_PORT=${{ secrets.DB_PORT }} \
              -e HR_APP_DATABASE_USER=${{ secrets.DB_USER }} \
              -e HR_APP_DATABASE_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e HR_APP_DATABASE_NAME=${{ secrets.DB_NAME }} \
              -e HR_APP_REDIS_HOST=redis \
              -e HR_APP_REDIS_PORT=6379 \
              -e HR_APP_REDIS_DB=0 \
              -e HR_APP_AI_SERVICE_URL=http://ai-ml-service:8001 \
              -e HR_APP_VECTOR_DIMENSION=768 \
              -e HR_APP_CACHE_PREFIX=hr_worker \
              -e PYTHONPATH=/app \
              -e SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
              -e SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:worker-latest \
              python3 -m arq src.worker.WorkerSettings
            
            echo '=== Starting Frontend (Only Public Entry Point) ==='
            docker run -d \
              --name frontend \
              --network hr-network \
              --restart unless-stopped \
              -p 80:3000 \
              -e NEXT_PUBLIC_API_URL=http://backend:8000 \
              -e NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
              -e NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:frontend-latest
            
            echo '=== Waiting for services to be ready ==='
            sleep 15
            
            echo ''
            echo '=== Running Containers ==='
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            echo ''
            
            echo '=== Testing Internal Connectivity ==='
            if docker exec frontend wget -q -O- --timeout=5 http://backend:8000/health 2>/dev/null; then
              echo '✅ Frontend → Backend: Connected'
            else
              echo '⚠️ Frontend → Backend: Health endpoint not available'
              if docker ps | grep -q backend; then
                echo '✅ Backend container is running'
              else
                echo '❌ Backend container failed'
                docker logs backend --tail=20
              fi
            fi
            
            echo ''
            echo '=== Public Access Tests ==='
            if curl -f -s -o /dev/null -m 5 http://localhost:80; then
              echo '✅ Frontend: Accessible on port 80'
            else
              echo '❌ Frontend: Not accessible'
              docker logs frontend --tail=20
            fi
            
            echo ''
            echo '=== Security Verification ==='
            echo 'Checking if backend port 8000 is exposed to host...'
            if docker port backend 2>/dev/null | grep -q 8000; then
              echo '❌ WARNING: Backend port 8000 is exposed to host!'
            else
              echo '✅ Backend: No ports exposed to host (Secure)'
            fi
            
            echo 'Checking if AI-ML port 8001 is exposed to host...'
            if docker port ai-ml-service 2>/dev/null | grep -q 8001; then
              echo '❌ WARNING: AI-ML port 8001 is exposed to host!'
            else
              echo '✅ AI-ML: No ports exposed to host (Secure)'
            fi
            
            echo 'Checking if Redis port 6379 is exposed to host...'
            if docker port redis 2>/dev/null | grep -q 6379; then
              echo '❌ WARNING: Redis port 6379 is exposed to host!'
            else
              echo '✅ Redis: No ports exposed to host (Secure)'
            fi
            
            echo ''
            echo '=== Deployment Complete ==='
            echo '✅ Frontend: http://${{ secrets.DEPLOY_HOST }}'
            echo '✅ Backend: Internal only (NOT exposed to internet)'
            echo '✅ AI-ML: Internal only (NOT exposed to internet)'
            echo '✅ Redis: Internal only (NOT exposed to internet)'
            echo '✅ Worker: Internal only (NOT exposed to internet)'
            echo ''
            echo 'Architecture: Browser → Frontend(port 80) → Backend(internal) → AI-ML/Redis(internal)'
            echo ''
            echo 'To check logs:'
            echo '  docker logs backend'
            echo '  docker logs ai-ml-service'
            echo '  docker logs frontend'
          "