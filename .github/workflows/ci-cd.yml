name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, ai-ml, frontend, worker]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service == 'worker' && './services/backend' || format('./services/{0}', matrix.service) }}
          file: ${{ matrix.service == 'worker' && './services/backend/Dockerfile' || format('./services/{0}/Dockerfile', matrix.service) }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:${{ matrix.service }}-latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:${{ matrix.service }}-${{ github.sha }}
          build-args: |
            ${{ matrix.service == 'frontend' && format('NEXT_PUBLIC_API_URL={0}', secrets.NEXT_PUBLIC_API_URL) || '' }}
            ${{ matrix.service == 'frontend' && format('NEXT_PUBLIC_SUPABASE_URL={0}', secrets.NEXT_PUBLIC_SUPABASE_URL) || '' }}
            ${{ matrix.service == 'frontend' && format('NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY={0}', secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-server:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
          
          # SINGLE SSH SESSION - All commands in one connection
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.DEPLOY_PORT }} -o ServerAliveInterval=60 -o ConnectTimeout=30 ${{ secrets.DEPLOY_USERNAME }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            
            echo '=== Starting Deployment ==='
            
            # Stop old containers
            echo 'Stopping old containers...'
            docker stop redis backend ai-ml-service worker frontend 2>/dev/null || true
            docker rm redis backend ai-ml-service worker frontend 2>/dev/null || true
            
            # Clean up
            echo 'Cleaning up...'
            docker system prune -a -f 2>/dev/null || true
            
            # Create network
            echo 'Creating network...'
            docker network create hr-network 2>/dev/null || true
            
            # Pull images
            echo 'Pulling images...'
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:backend-latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:ai-ml-latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:frontend-latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:worker-latest
            
            # Start Redis
            echo 'Starting Redis...'
            docker run -d --name redis --network hr-network --restart unless-stopped redis:7-alpine
            
            # Start Backend (no port exposure)
            echo 'Starting Backend...'
            docker run -d \
              --name backend \
              --network hr-network \
              --restart unless-stopped \
              -e HR_APP_ENVIRONMENT=production \
              -e HR_APP_REDIS_HOST=redis \
              -e HR_APP_REDIS_PORT=6379 \
              -e HR_APP_REDIS_DB=0 \
              -e HR_APP_AI_SERVICE_URL=http://ai-ml-service:8001 \
              -e HR_APP_VECTOR_DIMENSION=768 \
              -e HR_APP_CACHE_PREFIX=hr_backend \
              -e PYTHONPATH=/app \
              -e SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
              -e SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:backend-latest
            
            # Wait for backend
            echo 'Waiting for backend...'
            sleep 10
            
            # Start AI-ML
            echo 'Starting AI-ML Service...'
            docker run -d \
              --name ai-ml-service \
              --network hr-network \
              --restart unless-stopped \
              -e REDIS_HOST=redis \
              -e REDIS_PORT=6379 \
              -e REDIS_DB=1 \
              -e REDIS_PREFIX=aiml \
              -e PYTHONPATH=/app/src \
              -e GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:ai-ml-latest
            
            # Start Worker
            echo 'Starting Worker...'
            docker run -d \
              --name worker \
              --network hr-network \
              --restart unless-stopped \
              -e HR_APP_ENVIRONMENT=production \
              -e HR_APP_REDIS_HOST=redis \
              -e HR_APP_REDIS_PORT=6379 \
              -e HR_APP_REDIS_DB=0 \
              -e HR_APP_AI_SERVICE_URL=http://ai-ml-service:8001 \
              -e HR_APP_VECTOR_DIMENSION=768 \
              -e HR_APP_CACHE_PREFIX=hr_worker \
              -e PYTHONPATH=/app \
              -e SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
              -e SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:worker-latest \
              python3 -m arq src.worker.WorkerSettings
            
            # Start Frontend (only public port)
            echo 'Starting Frontend...'
            docker run -d \
              --name frontend \
              --network hr-network \
              --restart unless-stopped \
              -p 80:3000 \
              -e NEXT_PUBLIC_API_URL=http://backend:8000 \
              -e NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
              -e NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:frontend-latest
            
            # Wait for services
            echo 'Waiting for services...'
            sleep 15
            
            # Show running containers
            echo ''
            echo '=== Running Containers ==='
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            
            # Test frontend
            echo ''
            echo '=== Testing Frontend ==='
            if curl -f -s -o /dev/null http://localhost:80; then
              echo '✅ Frontend is running on port 80'
            else
              echo '❌ Frontend failed to start'
              docker logs frontend --tail=20
              exit 1
            fi
            
            # Verify no ports exposed for backend
            echo ''
            echo '=== Security Check ==='
            if docker port backend 2>/dev/null | grep -q .; then
              echo '❌ Backend has exposed ports!'
              docker port backend
            else
              echo '✅ Backend has no exposed ports (secure)'
            fi
            
            # Show backend logs
            echo ''
            echo '=== Backend Logs (last 5 lines) ==='
            docker logs backend --tail=5 2>&1 || echo 'No logs yet'
            
            echo ''
            echo '=== Deployment Complete ==='
            echo '✅ Application live at: http://${{ secrets.DEPLOY_HOST }}'
            echo '✅ Backend is internal only (not exposed)'
            echo ''
            echo 'To view logs: docker logs backend'
            echo 'To restart: docker restart backend'
          EOF