name: CI/CD Pipeline

on:
  push:
    branches:
      - feature/aiml-backend-integration
  pull_request:
    branches:
      - feature/aiml-backend-integration

jobs:
  # Job 1: Check and Build
  check-and-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build Backend (without push)
      - name: Build Backend
        uses: docker/build-push-action@v5
        with:
          context: ./services/backend
          file: ./services/backend/Dockerfile
          push: false
          load: true
          tags: hr-app-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build AI-ML Service (without push)
      - name: Build AI-ML Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/ai-ml
          file: ./services/ai-ml/Dockerfile
          push: false
          load: true
          tags: hr-app-ai-ml:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build Frontend (without push)
      - name: Build Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          file: ./services/frontend/Dockerfile
          push: false
          load: true
          tags: hr-app-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build Worker (without push)
      - name: Build Worker
        uses: docker/build-push-action@v5
        with:
          context: ./services/backend
          file: ./services/backend/Dockerfile
          push: false
          load: true
          tags: hr-app-worker:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 2: Push to Docker Hub
  push-to-dockerhub:
    runs-on: ubuntu-latest
    needs: check-and-build  
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Push Backend
      - name: Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./services/backend
          file: ./services/backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:backend-latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:backend-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Push AI-ML Service
      - name: Push AI-ML Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/ai-ml
          file: ./services/ai-ml/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:ai-ml-latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:ai-ml-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Push Frontend
      - name: Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          file: ./services/frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:frontend-latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:frontend-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Push Worker
      - name: Push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./services/backend
          file: ./services/backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:worker-latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:worker-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
