name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  # Combined check, build, and push in one job to avoid rebuilding
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:v0.12.5
            network=host

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Cache Docker layers
      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # Build and push all services in parallel using matrix strategy
      - name: Build and Push Services
        run: |
          # Function to build and push service
          build_and_push() {
            local service=$1
            local context=$2
            local dockerfile=$3
            local build_args=$4
            
            echo "Building $service..."
            
            docker buildx build \
              --cache-from=type=local,src=/tmp/.buildx-cache \
              --cache-to=type=local,dest=/tmp/.buildx-cache-new,mode=max \
              --platform linux/amd64 \
              --build-arg BUILDKIT_INLINE_CACHE=1 \
              $build_args \
              --file $dockerfile \
              --tag ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:$service-latest \
              --tag ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:$service-${{ github.sha }} \
              --push \
              $context &
          }
          
          # Build all services in parallel
          build_and_push "backend" "./services/backend" "./services/backend/Dockerfile" ""
          build_and_push "ai-ml" "./services/ai-ml" "./services/ai-ml/Dockerfile" ""
          build_and_push "worker" "./services/backend" "./services/backend/Dockerfile" ""
          
          # Build frontend with build args
          FRONTEND_ARGS="--build-arg NEXT_PUBLIC_API_URL=http://167.235.136.54:8000"
          FRONTEND_ARGS="$FRONTEND_ARGS --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
          FRONTEND_ARGS="$FRONTEND_ARGS --build-arg NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}"
          build_and_push "frontend" "./services/frontend" "./services/frontend/Dockerfile" "$FRONTEND_ARGS"
          
          # Wait for all background jobs to complete
          wait
          
          # Move cache to preserve for next build
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true

  # PR validation only - builds but doesn't push
  validate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build services (validation only)
        run: |
          # Build all services to validate Dockerfiles
          docker buildx build --load ./services/backend -t backend-test
          docker buildx build --load ./services/ai-ml -t ai-ml-test
          docker buildx build --load ./services/frontend -t frontend-test
          docker buildx build --load ./services/backend -t worker-test
          
          echo " All services built successfully"

  # Optimized deployment
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH with reduced downtime
        run: |
          # Setup SSH key
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
          
          # Optimized deployment script
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_USERNAME }}@${{ secrets.DEPLOY_HOST }} '
            set -e  # Exit on error
            
            echo " Starting deployment..."
            
            # Pull all images in parallel
            echo " Pulling images..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:backend-latest &
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:ai-ml-latest &
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:frontend-latest &
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:worker-latest &
            wait
            
            # Create network if not exists
            docker network create hr-network 2>/dev/null || true
            
            # Start/update Redis containers if not running
            if ! docker ps | grep -q redis; then
              echo " Starting Redis containers..."
              docker run -d --name redis --network hr-network --restart unless-stopped -p 6379:6379 redis:7-alpine
              docker run -d --name ai-ml-redis --network hr-network --restart unless-stopped -p 6380:6379 redis:7
            fi
            
            # Update containers with minimal downtime using rolling updates
            echo " Updating services..."
            
            # Update worker first (no user impact)
            docker stop worker 2>/dev/null || true
            docker rm worker 2>/dev/null || true
            docker run -d \
              --name worker \
              --network hr-network \
              --restart unless-stopped \
              -e HR_APP_DATABASE_HOST=52.62.122.103 \
              -e HR_APP_DATABASE_PORT=6543 \
              -e HR_APP_DATABASE_USER=postgres.ectxlkkilezsebodryhd \
              -e HR_APP_DATABASE_PASSWORD=Hr_app@vaspp.com \
              -e HR_APP_DATABASE_NAME=postgres \
              -e HR_APP_REDIS_HOST=redis \
              -e HR_APP_REDIS_PORT=6379 \
              -e HR_APP_AI_SERVICE_URL=http://ai-ml:8001 \
              -e HR_APP_VECTOR_DIMENSION=3072 \
              -e HR_APP_CACHE_PREFIX=hr_app \
              -e PYTHONPATH=/app \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:worker-latest \
              python3 -m arq src.worker.WorkerSettings
            
            # Update AI-ML service
            docker stop ai-ml 2>/dev/null || true
            docker rm ai-ml 2>/dev/null || true
            docker run -d \
              --name ai-ml \
              --network hr-network \
              --restart unless-stopped \
              -p 8001:8001 \
              -e REDIS_HOST=ai-ml-redis \
              -e REDIS_PORT=6379 \
              -e DATABASE_URL="postgresql://postgres.ectxlkkilezsebodryhd:Hr_app@vaspp.com@52.62.122.103:6543/postgres" \
              -e PYTHONPATH=/app/src \
              -e GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:ai-ml-latest
            
            # Update backend
            docker stop backend 2>/dev/null || true
            docker rm backend 2>/dev/null || true
            docker run -d \
              --name backend \
              --network hr-network \
              --restart unless-stopped \
              -p 8000:8000 \
              -e HR_APP_DATABASE_HOST=52.62.122.103 \
              -e HR_APP_DATABASE_PORT=6543 \
              -e HR_APP_DATABASE_USER=postgres.ectxlkkilezsebodryhd \
              -e HR_APP_DATABASE_PASSWORD=Hr_app@vaspp.com \
              -e HR_APP_DATABASE_NAME=postgres \
              -e HR_APP_ENVIRONMENT=production \
              -e HR_APP_REDIS_HOST=redis \
              -e HR_APP_REDIS_PORT=6379 \
              -e HR_APP_AI_SERVICE_URL=http://ai-ml:8001 \
              -e HR_APP_VECTOR_DIMENSION=3072 \
              -e HR_APP_CACHE_PREFIX=hr_app \
              -e PYTHONPATH=/app \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:backend-latest
            
            # Update frontend last (minimal downtime)
            docker stop frontend 2>/dev/null || true
            docker rm frontend 2>/dev/null || true
            docker run -d \
              --name frontend \
              --restart unless-stopped \
              -p 80:3000 \
              -e NEXT_PUBLIC_API_URL=http://167.235.136.54:8000 \
              -e NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
              -e NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:frontend-latest
            
            # Quick health check
            echo "Running health checks..."
            sleep 5
            
            # Check all services
            for i in {1..10}; do
              BACKEND_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || echo "000")
              FRONTEND_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80 || echo "000")
              
              if [ "$BACKEND_HEALTH" = "200" ] && [ "$FRONTEND_HEALTH" = "200" ]; then
                echo " All services healthy!"
                break
              fi
              echo "Waiting for services... ($i/10)"
              sleep 3
            done
            
            # Show final status
            echo ""
            echo "=== Deployment Complete ==="
            echo "Frontend: http://167.235.136.54"
            echo "Backend API: http://167.235.136.54:8000"
            echo ""
            docker ps --format "table {{.Names}}\t{{.Status}}"
          '