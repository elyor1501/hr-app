name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, ai-ml, frontend, worker]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service == 'worker' && './services/backend' || format('./services/{0}', matrix.service) }}
          file: ${{ matrix.service == 'worker' && './services/backend/Dockerfile' || format('./services/{0}/Dockerfile', matrix.service) }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:${{ matrix.service }}-latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:${{ matrix.service }}-${{ github.sha }}
          build-args: |
            ${{ matrix.service == 'frontend' && format('NEXT_PUBLIC_API_URL={0}', secrets.NEXT_PUBLIC_API_URL) || '' }}
            ${{ matrix.service == 'frontend' && format('NEXT_PUBLIC_SUPABASE_URL={0}', secrets.NEXT_PUBLIC_SUPABASE_URL) || '' }}
            ${{ matrix.service == 'frontend' && format('NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY={0}', secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-server:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
          
          # Step 1: Cleanup disk space
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_USERNAME }}@${{ secrets.DEPLOY_HOST }} "
            echo '=== Cleaning up disk space ==='
            
            # Stop all containers first
            docker stop hr-backend hr-ai-ml-service hr-frontend hr-worker redis 2>/dev/null || true
            docker rm hr-backend hr-ai-ml-service hr-frontend hr-worker redis 2>/dev/null || true
            
            # Remove unused Docker data
            docker system prune -a -f 2>/dev/null || true
            docker volume prune -f 2>/dev/null || true
            docker container prune -f 2>/dev/null || true
            docker image prune -a -f 2>/dev/null || true
            docker builder prune -a -f 2>/dev/null || true
            
            # Remove old images
            docker rmi \$(docker images -q) 2>/dev/null || true
            
            # Clean system
            sudo apt-get clean 2>/dev/null || true
            sudo journalctl --vacuum-time=3d 2>/dev/null || true
            
            # Check disk space
            echo '=== Disk space after cleanup ==='
            df -h
            
            echo '=== Cleanup complete ==='
          "
          
          # Step 2: Deploy containers with host network mode
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_USERNAME }}@${{ secrets.DEPLOY_HOST }} "
            echo '=== Pulling latest images ==='
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:backend-latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:ai-ml-latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:frontend-latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:worker-latest
            
            echo '=== Starting Redis ==='
            docker run -d \
              --name redis \
              --network host \
              --restart unless-stopped \
              -v redis_data:/data \
              redis:7-alpine
            
            echo '=== Starting AI-ML Service ==='
            docker run -d \
              --name hr-ai-ml-service \
              --network host \
              --restart unless-stopped \
              -e REDIS_HOST=localhost \
              -e REDIS_PORT=6379 \
              -e REDIS_DB=1 \
              -e REDIS_PREFIX=aiml \
              -e DATABASE_URL=\"${{ secrets.DATABASE_URL }}\" \
              -e PYTHONPATH=/app/src \
              -e GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:ai-ml-latest
            
            echo '=== Starting Backend ==='
            docker run -d \
              --name hr-backend \
              --network host \
              --restart unless-stopped \
              -e HR_APP_DATABASE_HOST=${{ secrets.DB_HOST }} \
              -e HR_APP_DATABASE_PORT=${{ secrets.DB_PORT }} \
              -e HR_APP_DATABASE_USER=${{ secrets.DB_USER }} \
              -e HR_APP_DATABASE_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e HR_APP_DATABASE_NAME=${{ secrets.DB_NAME }} \
              -e HR_APP_ENVIRONMENT=production \
              -e HR_APP_REDIS_HOST=localhost \
              -e HR_APP_REDIS_PORT=6379 \
              -e HR_APP_REDIS_DB=0 \
              -e HR_APP_AI_SERVICE_URL=http://localhost:8001 \
              -e HR_APP_VECTOR_DIMENSION=768 \
              -e HR_APP_CACHE_PREFIX=hr_backend \
              -e PYTHONPATH=/app \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:backend-latest
            
            echo '=== Waiting for backend to start ==='
            sleep 10
            
            for i in {1..30}; do
              if curl -f http://localhost:8000/health 2>/dev/null; then
                echo '✅ Backend is healthy'
                break
              fi
              echo \"Attempt \$i/30: Backend not ready yet...\"
              sleep 2
            done
            
            echo '=== Starting Worker ==='
            docker run -d \
              --name hr-worker \
              --network host \
              --restart unless-stopped \
              -e HR_APP_DATABASE_HOST=${{ secrets.DB_HOST }} \
              -e HR_APP_DATABASE_PORT=${{ secrets.DB_PORT }} \
              -e HR_APP_DATABASE_USER=${{ secrets.DB_USER }} \
              -e HR_APP_DATABASE_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e HR_APP_DATABASE_NAME=${{ secrets.DB_NAME }} \
              -e HR_APP_REDIS_HOST=localhost \
              -e HR_APP_REDIS_PORT=6379 \
              -e HR_APP_REDIS_DB=0 \
              -e HR_APP_AI_SERVICE_URL=http://localhost:8001 \
              -e HR_APP_VECTOR_DIMENSION=768 \
              -e HR_APP_CACHE_PREFIX=hr_worker \
              -e PYTHONPATH=/app \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:worker-latest \
              python3 -m arq src.worker.WorkerSettings
            
            echo '=== Starting Frontend ==='
            docker run -d \
              --name hr-frontend \
              --network host \
              --restart unless-stopped \
              -e NEXT_PUBLIC_API_URL=\"http://${{ secrets.DEPLOY_HOST }}:8000\" \
              -e NEXT_PUBLIC_SUPABASE_URL=\"${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}\" \
              -e NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=\"${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}\" \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:frontend-latest
            
            echo '=== Waiting for all services ==='
            sleep 10
            
            echo ''
            echo '=== Running Containers ==='
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            echo ''
            
            echo '=== Health Check Results ==='
            
            # Check backend
            if curl -f http://localhost:8000/health > /dev/null 2>&1; then
              echo '✅ Backend: OK'
            else
              echo '❌ Backend: FAILED'
            fi
            
            # Check AI-ML
            if curl -f http://localhost:8001/health > /dev/null 2>&1; then
              echo '✅ AI-ML: OK'
            else
              echo '⚠️ AI-ML: No health endpoint'
            fi
            
            # Check frontend
            if curl -f http://localhost:3000 > /dev/null 2>&1; then
              echo '✅ Frontend: OK (Internal)'
            else
              echo '❌ Frontend: FAILED'
            fi
            
            # Check frontend via port 80 (should be accessible)
            if curl -f http://localhost:80 > /dev/null 2>&1; then
              echo '✅ Frontend: OK (Port 80)'
            else
              echo '⚠️ Frontend: Not on port 80'
            fi
            
            echo ''
            echo '=== Port Accessibility Verification ==='
            
            # Check if ports are accessible externally
            echo 'Checking external accessibility:'
            
            # Port 80 (Frontend) - Should be accessible
            if curl -f --connect-timeout 5 http://${{ secrets.DEPLOY_HOST }}:80 > /dev/null 2>&1; then
              echo '✅ Port 80 (Frontend): Publicly accessible'
            else
              echo '❌ Port 80 (Frontend): Not accessible'
            fi
            
            # Port 8000 (Backend) - Should be accessible (host network mode)
            if curl -f --connect-timeout 5 http://${{ secrets.DEPLOY_HOST }}:8000/health > /dev/null 2>&1; then
              echo '✅ Port 8000 (Backend): Publicly accessible'
            else
              echo '❌ Port 8000 (Backend): Not accessible'
            fi
            
            # Port 8001 (AI-ML) - Should be accessible (host network mode)
            if curl -f --connect-timeout 5 http://${{ secrets.DEPLOY_HOST }}:8001/health > /dev/null 2>&1; then
              echo '⚠️ Port 8001 (AI-ML): Publicly accessible'
            else
              echo '✅ Port 8001 (AI-ML): Not accessible'
            fi
            
            # Port 6379 (Redis) - Should NOT be accessible
            if nc -zv ${{ secrets.DEPLOY_HOST }} 6379 2>&1 | grep -q succeeded; then
              echo '⚠️ Port 6379 (Redis): Publicly accessible'
            else
              echo '✅ Port 6379 (Redis): Not accessible'
            fi
            
            echo ''
            echo '=== Container Logs (Last 5 lines) ==='
            echo '--- Backend ---'
            docker logs hr-backend --tail 5 2>/dev/null || echo 'No logs'
            echo ''
            echo '--- Frontend ---'
            docker logs hr-frontend --tail 5 2>/dev/null || echo 'No logs'
            echo ''
            echo '--- AI-ML ---'
            docker logs hr-ai-ml-service --tail 5 2>/dev/null || echo 'No logs'
            echo ''
            
            echo '=== Deployment Complete ==='
            echo 'Frontend: http://${{ secrets.DEPLOY_HOST }}'
            echo 'Backend API: http://${{ secrets.DEPLOY_HOST }}:8000'
            echo 'AI-ML API: http://${{ secrets.DEPLOY_HOST }}:8001'
            echo ''
            echo '⚠️  IMPORTANT SECURITY NOTE:'
            echo 'With host network mode, all ports are exposed directly to the host.'
            echo 'Ports 8000 and 8001 are publicly accessible!'
            echo ''
            echo 'If you want to restrict access, you have two options:'
            echo '1. Use a firewall (UFW) to block external access to specific ports'
            echo '2. Switch back to bridge network with Nginx reverse proxy'
            echo ''
            echo 'Current exposed ports: 80, 3000, 6379, 8000, 8001'
          "