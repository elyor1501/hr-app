name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, ai-ml, frontend, worker]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service == 'worker' && './services/backend' || format('./services/{0}', matrix.service) }}
          file: ${{ matrix.service == 'worker' && './services/backend/Dockerfile' || format('./services/{0}/Dockerfile', matrix.service) }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:${{ matrix.service }}-latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:${{ matrix.service }}-${{ github.sha }}
          build-args: |
            ${{ matrix.service == 'frontend' && format('NEXT_PUBLIC_API_URL={0}', 'http://backend:8000') || '' }}
            ${{ matrix.service == 'frontend' && format('NEXT_PUBLIC_SUPABASE_URL={0}', secrets.NEXT_PUBLIC_SUPABASE_URL) || '' }}
            ${{ matrix.service == 'frontend' && format('NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY={0}', secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-server:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
          
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_USERNAME }}@${{ secrets.DEPLOY_HOST }} "
            echo '=== Cleaning up disk space ==='
            docker stop \$(docker ps -aq) 2>/dev/null || true
            docker rm \$(docker ps -aq) 2>/dev/null || true
            docker system prune -a -f 2>/dev/null || true
            docker volume prune -f 2>/dev/null || true
            docker container prune -f 2>/dev/null || true
            docker image prune -a -f 2>/dev/null || true
            docker builder prune -a -f 2>/dev/null || true
            sudo apt-get clean 2>/dev/null || true
            sudo journalctl --vacuum-time=3d 2>/dev/null || true
            df -h
            echo '=== Cleanup complete ==='
          "
          
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_USERNAME }}@${{ secrets.DEPLOY_HOST }} "
            echo '=== Configuring firewall ==='
            sudo systemctl stop nginx 2>/dev/null || true
            sudo systemctl disable nginx 2>/dev/null || true
            docker stop nginx 2>/dev/null || true
            docker rm nginx 2>/dev/null || true
            sudo fuser -k 80/tcp 2>/dev/null || true
            sudo fuser -k 443/tcp 2>/dev/null || true
            # Remove backend ports from firewall (not needed anymore)
            sudo ufw delete allow 8000/tcp 2>/dev/null || true
            sudo ufw delete allow 8001/tcp 2>/dev/null || true
            sudo ufw allow 80/tcp 2>/dev/null || true
            sudo ufw allow 443/tcp 2>/dev/null || true
            sudo ufw reload 2>/dev/null || true
            echo '=== Firewall configured ==='
          "
          
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_USERNAME }}@${{ secrets.DEPLOY_HOST }} "
            echo '=== Creating network ==='
            docker network create hr-network 2>/dev/null || true
            
            echo '=== Pulling latest images ==='
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:backend-latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:ai-ml-latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:frontend-latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:worker-latest
            
            echo '=== Starting Redis (Internal Only) ==='
            docker run -d \
              --name redis \
              --network hr-network \
              --restart unless-stopped \
              --no-public-port \
              redis:7-alpine
            
            echo '=== Starting Backend (Internal Only - No Port Exposure) ==='
            docker run -d \
              --name backend \
              --network hr-network \
              --restart unless-stopped \
              --no-public-port \
              -e HR_APP_DATABASE_HOST=${{ secrets.DB_HOST }} \
              -e HR_APP_DATABASE_PORT=${{ secrets.DB_PORT }} \
              -e HR_APP_DATABASE_USER=${{ secrets.DB_USER }} \
              -e HR_APP_DATABASE_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e HR_APP_DATABASE_NAME=${{ secrets.DB_NAME }} \
              -e HR_APP_ENVIRONMENT=production \
              -e HR_APP_REDIS_HOST=redis \
              -e HR_APP_REDIS_PORT=6379 \
              -e HR_APP_REDIS_DB=0 \
              -e HR_APP_AI_SERVICE_URL=http://ai-ml-service:8001 \
              -e HR_APP_VECTOR_DIMENSION=768 \
              -e HR_APP_CACHE_PREFIX=hr_backend \
              -e PYTHONPATH=/app \
              -e SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
              -e SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:backend-latest
            
            echo '=== Starting AI-ML Service (Internal Only - No Port Exposure) ==='
            docker run -d \
              --name ai-ml-service \
              --network hr-network \
              --restart unless-stopped \
              --no-public-port \
              -e REDIS_HOST=redis \
              -e REDIS_PORT=6379 \
              -e REDIS_DB=1 \
              -e REDIS_PREFIX=aiml \
              -e DATABASE_URL=\"${{ secrets.DATABASE_URL }}\" \
              -e PYTHONPATH=/app/src \
              -e GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:ai-ml-latest
            
            echo '=== Starting Worker (Internal Only - No Port Exposure) ==='
            docker run -d \
              --name worker \
              --network hr-network \
              --restart unless-stopped \
              --no-public-port \
              -e HR_APP_DATABASE_HOST=${{ secrets.DB_HOST }} \
              -e HR_APP_DATABASE_PORT=${{ secrets.DB_PORT }} \
              -e HR_APP_DATABASE_USER=${{ secrets.DB_USER }} \
              -e HR_APP_DATABASE_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e HR_APP_DATABASE_NAME=${{ secrets.DB_NAME }} \
              -e HR_APP_REDIS_HOST=redis \
              -e HR_APP_REDIS_PORT=6379 \
              -e HR_APP_REDIS_DB=0 \
              -e HR_APP_AI_SERVICE_URL=http://ai-ml-service:8001 \
              -e HR_APP_VECTOR_DIMENSION=768 \
              -e HR_APP_CACHE_PREFIX=hr_worker \
              -e PYTHONPATH=/app \
              -e SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
              -e SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:worker-latest \
              python3 -m arq src.worker.WorkerSettings
            
            echo '=== Starting Frontend (Public Entry Point Only) ==='
            docker run -d \
              --name frontend \
              --network hr-network \
              --restart unless-stopped \
              -p 80:3000 \
              -e NEXT_PUBLIC_API_URL=http://backend:8000 \
              -e NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
              -e NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:frontend-latest
            
            echo '=== Waiting for services to start ==='
            sleep 15
            
            echo ''
            echo '=== Running Containers ==='
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            echo ''
            
            echo '=== Internal Connectivity Tests ==='
            # Test from frontend to backend
            if docker exec frontend wget -q -O- http://backend:8000/health 2>/dev/null; then
              echo '✅ Frontend → Backend: Connected'
            else
              echo '❌ Frontend → Backend: Failed'
            fi
            
            # Test from backend to AI-ML
            if docker exec backend wget -q -O- http://ai-ml-service:8001/health 2>/dev/null; then
              echo '✅ Backend → AI-ML: Connected'
            else
              echo '⚠️ Backend → AI-ML: No health endpoint'
            fi
            
            # Test from backend to Redis
            if docker exec backend redis-cli -h redis ping 2>/dev/null; then
              echo '✅ Backend → Redis: Connected'
            else
              echo '❌ Backend → Redis: Failed'
            fi
            
            echo ''
            echo '=== Public Access Tests ==='
            # Test frontend accessibility
            if curl -f -s -o /dev/null http://localhost:80; then
              echo '✅ Frontend: Publicly accessible on port 80'
            else
              echo '❌ Frontend: Not accessible'
            fi
            
            # Verify backend is NOT publicly accessible
            if curl -f -s -o /dev/null --connect-timeout 3 http://localhost:8000/health 2>/dev/null; then
              echo '⚠️ WARNING: Backend is publicly accessible on port 8000!'
            else
              echo '✅ Backend: Not publicly accessible (Secure)'
            fi
            
            # Verify AI-ML is NOT publicly accessible
            if curl -f -s -o /dev/null --connect-timeout 3 http://localhost:8001/health 2>/dev/null; then
              echo '⚠️ WARNING: AI-ML is publicly accessible on port 8001!'
            else
              echo '✅ AI-ML: Not publicly accessible (Secure)'
            fi
            
            echo ''
            echo '=== Port Binding Verification ==='
            docker port backend 2>/dev/null || echo '✅ Backend: No ports exposed to host'
            docker port ai-ml-service 2>/dev/null || echo '✅ AI-ML: No ports exposed to host'
            docker port redis 2>/dev/null || echo '✅ Redis: No ports exposed to host'
            docker port worker 2>/dev/null || echo '✅ Worker: No ports exposed to host'
            docker port frontend || echo 'Frontend ports:'
            
            echo ''
            echo '=== Deployment Complete ==='
            echo '✅ Frontend: http://${{ secrets.DEPLOY_HOST }}'
            echo '✅ Backend: Internal only (not exposed)'
            echo '✅ AI-ML: Internal only (not exposed)'
            echo '✅ Redis: Internal only (not exposed)'
            echo '✅ Worker: Internal only (not exposed)'
            echo ''
            echo 'Architecture: Frontend → Backend → AI-ML/Redis (All internal)'
          "