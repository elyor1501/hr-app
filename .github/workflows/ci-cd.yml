name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, ai-ml, frontend, worker]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service == 'worker' && './services/backend' || format('./services/{0}', matrix.service) }}
          file: ${{ matrix.service == 'worker' && './services/backend/Dockerfile' || format('./services/{0}/Dockerfile', matrix.service) }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:${{ matrix.service }}-latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:${{ matrix.service }}-${{ github.sha }}
          build-args: |
            ${{ matrix.service == 'frontend' && format('NEXT_PUBLIC_API_URL=http://167.235.136.54:8000
            NEXT_PUBLIC_SUPABASE_URL={0}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY={1}', secrets.NEXT_PUBLIC_SUPABASE_URL, secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-server:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
          
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_USERNAME }}@${{ secrets.DEPLOY_HOST }} "
            sudo systemctl stop nginx 2>/dev/null || true
            sudo systemctl disable nginx 2>/dev/null || true
            docker stop nginx 2>/dev/null || true
            docker rm nginx 2>/dev/null || true
            
            sudo fuser -k 80/tcp 2>/dev/null || true
            sudo fuser -k 8000/tcp 2>/dev/null || true
            sudo fuser -k 8001/tcp 2>/dev/null || true
            
            sudo ufw allow 80/tcp 2>/dev/null || true
            sudo ufw delete allow 8000/tcp 2>/dev/null || true
            sudo ufw delete allow 8001/tcp 2>/dev/null || true
            sudo ufw reload 2>/dev/null || true
          "
          
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_USERNAME }}@${{ secrets.DEPLOY_HOST }} "
            docker stop backend ai-ml frontend worker redis ai-ml-redis 2>/dev/null || true
            docker rm backend ai-ml frontend worker redis ai-ml-redis 2>/dev/null || true
            
            docker network create hr-network 2>/dev/null || true
            
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:backend-latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:ai-ml-latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:frontend-latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:worker-latest
            
            docker run -d \
              --name redis \
              --network hr-network \
              --restart unless-stopped \
              -p 127.0.0.1:6379:6379 \
              redis:7-alpine
            
            docker run -d \
              --name ai-ml-redis \
              --network hr-network \
              --restart unless-stopped \
              -p 127.0.0.1:6380:6379 \
              redis:7
            
            docker run -d \
              --name backend \
              --network hr-network \
              --restart unless-stopped \
              -p 127.0.0.1:8000:8000 \
              -e HR_APP_DATABASE_HOST=52.62.122.103 \
              -e HR_APP_DATABASE_PORT=6543 \
              -e HR_APP_DATABASE_USER=postgres.ectxlkkilezsebodryhd \
              -e HR_APP_DATABASE_PASSWORD=Hr_app@vaspp.com \
              -e HR_APP_DATABASE_NAME=postgres \
              -e HR_APP_ENVIRONMENT=production \
              -e HR_APP_REDIS_HOST=redis \
              -e HR_APP_REDIS_PORT=6379 \
              -e HR_APP_AI_SERVICE_URL=http://ai-ml:8001 \
              -e HR_APP_VECTOR_DIMENSION=3072 \
              -e HR_APP_CACHE_PREFIX=hr_app \
              -e PYTHONPATH=/app \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:backend-latest
            
            sleep 10
            
            for i in {1..30}; do
              if curl -f http://127.0.0.1:8000/health 2>/dev/null; then
                break
              fi
              sleep 2
            done
            
            docker run -d \
              --name ai-ml \
              --network hr-network \
              --restart unless-stopped \
              -p 127.0.0.1:8001:8001 \
              -e REDIS_HOST=ai-ml-redis \
              -e REDIS_PORT=6379 \
              -e DATABASE_URL=\"postgresql://postgres.ectxlkkilezsebodryhd:Hr_app@vaspp.com@52.62.122.103:6543/postgres\" \
              -e PYTHONPATH=/app/src \
              -e GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:ai-ml-latest
            
            docker run -d \
              --name worker \
              --network hr-network \
              --restart unless-stopped \
              -e HR_APP_DATABASE_HOST=52.62.122.103 \
              -e HR_APP_DATABASE_PORT=6543 \
              -e HR_APP_DATABASE_USER=postgres.ectxlkkilezsebodryhd \
              -e HR_APP_DATABASE_PASSWORD=Hr_app@vaspp.com \
              -e HR_APP_DATABASE_NAME=postgres \
              -e HR_APP_REDIS_HOST=redis \
              -e HR_APP_REDIS_PORT=6379 \
              -e HR_APP_AI_SERVICE_URL=http://ai-ml:8001 \
              -e HR_APP_VECTOR_DIMENSION=3072 \
              -e HR_APP_CACHE_PREFIX=hr_app \
              -e PYTHONPATH=/app \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:worker-latest \
              python3 -m arq src.worker.WorkerSettings
            
            docker run -d \
              --name frontend \
              --network hr-network \
              --restart unless-stopped \
              -p 80:3000 \
              -e NEXT_PUBLIC_API_URL=http://167.235.136.54:8000 \
              -e NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
              -e NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:frontend-latest
            
            sleep 10
            
            echo '=== Deployment Status ==='
            docker ps --format 'table {{.Names}}\t{{.Status}}'
            echo ''
            
            curl -f http://127.0.0.1:8000/health > /dev/null 2>&1 && echo ' Backend: OK' || echo ' Backend: FAILED'
            curl -f http://127.0.0.1:8001/health > /dev/null 2>&1 && echo ' AI-ML: OK' || echo ' AI-ML: No health endpoint'
            curl -f http://localhost:80 > /dev/null 2>&1 && echo ' Frontend: OK' || echo ' Frontend: FAILED'
            echo ''
            
            curl -f --connect-timeout 5 http://167.235.136.54:8000/health > /dev/null 2>&1 && echo ' Backend exposed!' || echo ' Backend: Localhost only'
            curl -f --connect-timeout 5 http://167.235.136.54:8001/health > /dev/null 2>&1 && echo ' AI-ML exposed!' || echo ' AI-ML: Localhost only'
            curl -f --connect-timeout 5 http://167.235.136.54:80 > /dev/null 2>&1 && echo ' Frontend: Public' || echo ' Frontend: Not accessible'
            
            echo ''
            echo 'Deployment Complete: http://167.235.136.54'
          "