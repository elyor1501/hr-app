name: CI/CD Pipeline

on:
  push:
    branches:
      - feature/aiml-backend-integration
  pull_request:
    branches:
      - feature/aiml-backend-integration

jobs:
  # Job 1: Check and Build
  check-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build Backend
      - name: Build Backend
        uses: docker/build-push-action@v5
        with:
          context: ./services/backend
          file: ./services/backend/Dockerfile
          push: false
          load: true
          tags: hr-app-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build AI-ML Service
      - name: Build AI-ML Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/ai-ml
          file: ./services/ai-ml/Dockerfile
          push: false
          load: true
          tags: hr-app-ai-ml:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build Frontend
      - name: Build Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          file: ./services/frontend/Dockerfile
          push: false
          load: true
          tags: hr-app-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build Worker
      - name: Build Worker
        uses: docker/build-push-action@v5
        with:
          context: ./services/backend
          file: ./services/backend/Dockerfile
          push: false
          load: true
          tags: hr-app-worker:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 2: Push to Docker Hub
  push-to-dockerhub:
    runs-on: ubuntu-latest
    needs: check-and-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Push Backend
      - name: Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./services/backend
          file: ./services/backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:backend-latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:backend-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Push AI-ML Service
      - name: Push AI-ML Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/ai-ml
          file: ./services/ai-ml/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:ai-ml-latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:ai-ml-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Push Frontend
      - name: Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./services/frontend
          file: ./services/frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:frontend-latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:frontend-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Push Worker
      - name: Push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./services/backend
          file: ./services/backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:worker-latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:worker-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 3: Deploy to Server
  deploy-to-server:
    runs-on: ubuntu-latest
    needs: push-to-dockerhub
    if: github.event_name == 'push' && github.ref == 'refs/heads/feature/aiml-backend-integration'

    steps:
      - name: Setup SSH key and deploy
        run: |
          # Create .ssh directory
          mkdir -p ~/.ssh
          
          # Write the SSH private key from secrets
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # Add host to known_hosts to avoid host key verification prompt
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
          
          # Execute deployment commands via SSH
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_USERNAME }}@${{ secrets.DEPLOY_HOST }} '
            cd /home/deployer/your-docker-compose-directory
            docker-compose pull
            docker-compose up -d
          '
        shell: bash