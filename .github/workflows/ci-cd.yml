name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, ai-ml, frontend, worker]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service == 'worker' && './services/backend' || format('./services/{0}', matrix.service) }}
          file: ${{ matrix.service == 'worker' && './services/backend/Dockerfile' || format('./services/{0}/Dockerfile', matrix.service) }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:${{ matrix.service }}-latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:${{ matrix.service }}-${{ github.sha }}
          build-args: |
            ${{ matrix.service == 'frontend' && format('NEXT_PUBLIC_SUPABASE_URL={0}', secrets.NEXT_PUBLIC_SUPABASE_URL) || '' }}
            ${{ matrix.service == 'frontend' && format('NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY={0}', secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-server:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
          
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.DEPLOY_PORT }} -o ServerAliveInterval=60 ${{ secrets.DEPLOY_USERNAME }}@${{ secrets.DEPLOY_HOST }} "
            echo '=== Starting Deployment ==='
            
            echo '=== Cleaning up old containers ==='
            docker stop \$(docker ps -aq) 2>/dev/null || true
            docker rm \$(docker ps -aq) 2>/dev/null || true
            docker system prune -a -f 2>/dev/null || true
            
            echo '=== Creating network ==='
            docker network create hr-network 2>/dev/null || true
            
            echo '=== Pulling latest images ==='
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:backend-latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:ai-ml-latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:frontend-latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:worker-latest
            
            echo '=== Starting Redis ==='
            docker run -d \
              --name redis \
              --network hr-network \
              --restart unless-stopped \
              redis:7-alpine
            
            echo '=== Installing asyncpg driver and starting Backend ==='
            # Create a temporary container to install asyncpg
            docker create --name backend-temp \
              --network hr-network \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:backend-latest
            
            docker start backend-temp
            echo 'Installing asyncpg (async PostgreSQL driver)...'
            docker exec backend-temp pip install asyncpg --no-cache-dir
            echo 'Removing sync driver if present...'
            docker exec backend-temp pip uninstall -y psycopg2-binary psycopg2 2>/dev/null || true
            docker stop backend-temp
            
            # Commit the fixed image
            docker commit backend-temp backend-fixed
            docker rm backend-temp
            
            # Build async database URL
            DB_URL=\"postgresql+asyncpg://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@${{ secrets.DB_HOST }}:${{ secrets.DB_PORT }}/${{ secrets.DB_NAME }}\"
            
            # Run the fixed backend
            docker run -d \
              --name backend \
              --network hr-network \
              --restart unless-stopped \
              -e HR_APP_ENVIRONMENT=production \
              -e HR_APP_DATABASE_HOST=${{ secrets.DB_HOST }} \
              -e HR_APP_DATABASE_PORT=${{ secrets.DB_PORT }} \
              -e HR_APP_DATABASE_USER=${{ secrets.DB_USER }} \
              -e HR_APP_DATABASE_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e HR_APP_DATABASE_NAME=${{ secrets.DB_NAME }} \
              -e HR_APP_REDIS_HOST=redis \
              -e HR_APP_REDIS_PORT=6379 \
              -e HR_APP_REDIS_DB=0 \
              -e HR_APP_AI_SERVICE_URL=http://ai-ml-service:8001 \
              -e HR_APP_VECTOR_DIMENSION=768 \
              -e HR_APP_CACHE_PREFIX=hr_backend \
              -e PYTHONPATH=/app \
              -e SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
              -e SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }} \
              -e DATABASE_URL=\"$DB_URL\" \
              -e JWT_SECRET_KEY=\"${{ secrets.JWT_SECRET_KEY }}\" \
              -e JWT_ALGORITHM=HS256 \
              -e ACCESS_TOKEN_EXPIRE_MINUTES=30 \
              -e HR_APP_SECRET_KEY=\"${{ secrets.HR_APP_SECRET_KEY }}\" \
              backend-fixed
            
            echo '=== Waiting for backend to initialize ==='
            sleep 20
            
            echo '=== Checking Backend Health ==='
            for i in {1..30}; do
              if curl -f http://localhost:8000/health > /dev/null 2>&1; then
                echo '✅ Backend is healthy'
                break
              fi
              echo \"Attempt \$i/30: Backend not ready yet...\"
              sleep 2
            done
            
            echo '=== Starting AI-ML Service ==='
            docker run -d \
              --name ai-ml-service \
              --network hr-network \
              --restart unless-stopped \
              -e REDIS_HOST=redis \
              -e REDIS_PORT=6379 \
              -e REDIS_DB=1 \
              -e REDIS_PREFIX=aiml \
              -e DATABASE_URL=\"$DB_URL\" \
              -e PYTHONPATH=/app/src \
              -e GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:ai-ml-latest
            
            echo '=== Starting Worker ==='
            docker run -d \
              --name worker \
              --network hr-network \
              --restart unless-stopped \
              -e HR_APP_ENVIRONMENT=production \
              -e HR_APP_DATABASE_HOST=${{ secrets.DB_HOST }} \
              -e HR_APP_DATABASE_PORT=${{ secrets.DB_PORT }} \
              -e HR_APP_DATABASE_USER=${{ secrets.DB_USER }} \
              -e HR_APP_DATABASE_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e HR_APP_DATABASE_NAME=${{ secrets.DB_NAME }} \
              -e HR_APP_REDIS_HOST=redis \
              -e HR_APP_REDIS_PORT=6379 \
              -e HR_APP_REDIS_DB=0 \
              -e HR_APP_AI_SERVICE_URL=http://ai-ml-service:8001 \
              -e HR_APP_VECTOR_DIMENSION=768 \
              -e HR_APP_CACHE_PREFIX=hr_worker \
              -e PYTHONPATH=/app \
              -e SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
              -e SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:worker-latest \
              python3 -m arq src.worker.WorkerSettings
            
            echo '=== Starting Frontend ==='
            docker run -d \
              --name frontend \
              --network hr-network \
              --restart unless-stopped \
              -p 80:3000 \
              -e NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
              -e NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:frontend-latest
            
            echo '=== Waiting for services ==='
            sleep 15
            
            echo ''
            echo '=== Running Containers ==='
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            
            echo ''
            echo '=== Testing Backend ==='
            if curl -f http://localhost:8000/health > /dev/null 2>&1; then
              echo '✅ Backend: OK'
            else
              echo '❌ Backend: FAILED'
              echo '=== Backend Logs ==='
              docker logs backend --tail=50
            fi
            
            echo ''
            echo '=== Testing Frontend ==='
            if curl -f http://localhost:80 > /dev/null 2>&1; then
              echo '✅ Frontend: OK'
            else
              echo '❌ Frontend: FAILED'
              docker logs frontend --tail=20
            fi
            
            echo ''
            echo '=== Deployment Complete ==='
            echo '✅ App: http://${{ secrets.DEPLOY_HOST }}'
            echo '✅ Backend: Internal only (not exposed)'
          "